name: android-release-on-tag

on:
  push:
    tags:
      - "*"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - name: Validate tag and compute pubspec version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be semver MAJOR.MINOR.PATCH, optional leading v (got: $TAG)"
            exit 1
          fi
          SEMVER="${TAG#v}"
          echo "app_version=${SEMVER}+${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

  analyze:
    needs: validate-tag
    uses: ./.github/workflows/analyzer-check.yml

  commit-version:
    needs: [validate-tag, analyze]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump pubspec, open PR, merge when checks pass
        env:
          APP_VERSION: ${{ needs.validate-tag.outputs.app_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sed -i -E "s/^version:.+/version: ${APP_VERSION}/" pubspec.yaml
          if git diff --quiet pubspec.yaml; then
            echo "pubspec.yaml already at ${APP_VERSION}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG_SHA=$(git rev-parse HEAD)
          git add pubspec.yaml
          git commit -m "chore: bump version to ${APP_VERSION}"
          git fetch origin "${DEFAULT_BRANCH}"
          MAIN_SHA=$(git rev-parse "refs/remotes/origin/${DEFAULT_BRANCH}")
          if [ "${MAIN_SHA}" = "${TAG_SHA}" ]; then
            true
          elif git merge-base --is-ancestor "${TAG_SHA}" "${MAIN_SHA}"; then
            true
          else
            echo "::error::Tag must point to a commit on '${DEFAULT_BRANCH}' (same tip or an ancestor). Merge or move '${DEFAULT_BRANCH}' so it contains the tagged commit, then push the tag."
            exit 1
          fi
          SAFE_VERSION=$(printf '%s' "${APP_VERSION}" | tr '+' '-')
          BUMP_BRANCH="automated/pubspec-${SAFE_VERSION}-${GITHUB_RUN_ID}"
          git push origin "HEAD:refs/heads/${BUMP_BRANCH}"
          gh pr create \
            --repo "${GH_REPO}" \
            --base "${DEFAULT_BRANCH}" \
            --head "${BUMP_BRANCH}" \
            --title "chore: bump version to ${APP_VERSION}" \
            --body "Automated pubspec bump from tag push. Waits for required checks (e.g. analyze), then merges."
          sleep 5
          PR_URL=$(gh pr view "${BUMP_BRANCH}" --repo "${GH_REPO}" --json url --jq .url)
          echo "Enabling auto-merge for ${PR_URL} (merges when required checks and rules pass) ..."
          if ! gh pr merge "${PR_URL}" --repo "${GH_REPO}" --merge --auto; then
            echo "::error::Could not enable auto-merge. In the repo enable Settings → General → Allow auto-merge, and ensure Actions may merge pull requests."
            exit 1
          fi
          for _ in $(seq 1 90); do
            STATE=$(gh pr view "${PR_URL}" --repo "${GH_REPO}" --json state --jq .state)
            if [ "${STATE}" = "MERGED" ]; then
              echo "Merged."
              exit 0
            fi
            if [ "${STATE}" = "CLOSED" ]; then
              echo "::error::Pull request was closed without merging."
              exit 1
            fi
            sleep 20
          done
          echo "::error::Timed out waiting for merge of ${PR_URL}. Approve the PR if reviews are required, or merge manually."
          exit 1

  build:
    needs: [validate-tag, commit-version]
    uses: ./.github/workflows/android-build-production.yml
    with:
      app_version: ${{ needs.validate-tag.outputs.app_version }}
    secrets: inherit
