name: android-release-on-tag

on:
  push:
    tags:
      - "*"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - name: Validate tag and compute pubspec version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be semver MAJOR.MINOR.PATCH, optional leading v (got: $TAG)"
            exit 1
          fi
          SEMVER="${TAG#v}"
          echo "app_version=${SEMVER}+${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

  analyze:
    needs: validate-tag
    uses: ./.github/workflows/analyzer-check.yml

  commit-version:
    needs: [validate-tag, analyze]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump pubspec and push to default branch
        env:
          APP_VERSION: ${{ needs.validate-tag.outputs.app_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          sed -i -E "s/^version:.+/version: ${APP_VERSION}/" pubspec.yaml
          if git diff --quiet pubspec.yaml; then
            echo "pubspec.yaml already at ${APP_VERSION}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG_SHA=$(git rev-parse HEAD)
          git add pubspec.yaml
          git commit -m "chore: bump version to ${APP_VERSION}"
          git fetch origin "${DEFAULT_BRANCH}"
          MAIN_SHA=$(git rev-parse "refs/remotes/origin/${DEFAULT_BRANCH}")
          if [ "${MAIN_SHA}" != "${TAG_SHA}" ]; then
            echo "::error::Default branch '${DEFAULT_BRANCH}' is not at this tag's commit. Tag only the current tip of '${DEFAULT_BRANCH}' (merge first if needed), then push the tag."
            exit 1
          fi
          git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"

  build:
    needs: [validate-tag, commit-version]
    uses: ./.github/workflows/android-build-production.yml
    with:
      app_version: ${{ needs.validate-tag.outputs.app_version }}
    secrets: inherit
