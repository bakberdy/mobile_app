name: ios-upload-to-testflight

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: "Flutter iOS flavor to build and upload (development or production)"
        type: string
        default: production
      ref:
        description: "Git ref or SHA to checkout (defaults to the event ref)"
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      flavor:
        description: "Flutter iOS flavor to build and upload (development or production)"
        type: string
        default: production
      ref:
        description: "Git ref or SHA to checkout (defaults to the event ref)"
        type: string
        required: false
        default: ""

jobs:
  upload-to-testflight:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Check required secrets
        env:
          FLAVOR: ${{ inputs.flavor }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          IOS_BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          IOS_BUILD_CERTIFICATE_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          IOS_BUILD_PROVISION_PROFILE_BASE64_DEVELOPMENT: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64_DEVELOPMENT }}
          IOS_PROVISIONING_PROFILE_NAME_DEVELOPMENT: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME_DEVELOPMENT }}
          IOS_BUILD_PROVISION_PROFILE_BASE64_PRODUCTION: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64_PRODUCTION }}
          IOS_PROVISIONING_PROFILE_NAME_PRODUCTION: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME_PRODUCTION }}
          DEVELOPMENT_API_URL: ${{ secrets.DEVELOPMENT_API_URL }}
          DEVELOPMENT_ENVIRONMENT: ${{ secrets.DEVELOPMENT_ENVIRONMENT }}
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_ENVIRONMENT: ${{ secrets.PRODUCTION_ENVIRONMENT }}
        run: |
          set -euo pipefail
          rc=0
          if [ -z "${APP_STORE_CONNECT_KEY_ID}" ]; then echo "::error::Secret APP_STORE_CONNECT_KEY_ID is missing or empty."; rc=1; fi
          if [ -z "${APP_STORE_CONNECT_ISSUER_ID}" ]; then echo "::error::Secret APP_STORE_CONNECT_ISSUER_ID is missing or empty."; rc=1; fi
          if [ -z "${APP_STORE_CONNECT_API_KEY}" ]; then echo "::error::Secret APP_STORE_CONNECT_API_KEY is missing or empty (App Store Connect API .p8 contents or Base64 of that file)."; rc=1; fi
          if [ -z "${IOS_BUILD_CERTIFICATE_BASE64}" ]; then echo "::error::Secret IOS_BUILD_CERTIFICATE_BASE64 is missing or empty (Base64 of the iOS Distribution .p12)."; rc=1; fi
          if [ -z "${IOS_BUILD_CERTIFICATE_PASSWORD}" ]; then echo "::error::Secret IOS_BUILD_CERTIFICATE_PASSWORD is missing or empty."; rc=1; fi

          case "${FLAVOR}" in
            production)
              if [ -z "${IOS_BUILD_PROVISION_PROFILE_BASE64_PRODUCTION}" ]; then echo "::error::For flavor production, secret IOS_BUILD_PROVISION_PROFILE_BASE64_PRODUCTION is required."; rc=1; fi
              if [ -z "${IOS_PROVISIONING_PROFILE_NAME_PRODUCTION}" ]; then echo "::error::For flavor production, secret IOS_PROVISIONING_PROFILE_NAME_PRODUCTION is required."; rc=1; fi
              if [ -z "${PRODUCTION_API_URL}" ]; then echo "::error::For flavor production, secret PRODUCTION_API_URL is required (build config; see config/run/config.example.json)."; rc=1; fi
              if [ -z "${PRODUCTION_ENVIRONMENT}" ]; then echo "::error::For flavor production, secret PRODUCTION_ENVIRONMENT is required (build config; see config/run/config.example.json)."; rc=1; fi
              ;;
            development)
              if [ -z "${IOS_BUILD_PROVISION_PROFILE_BASE64_DEVELOPMENT}" ]; then echo "::error::For flavor development, secret IOS_BUILD_PROVISION_PROFILE_BASE64_DEVELOPMENT is required."; rc=1; fi
              if [ -z "${IOS_PROVISIONING_PROFILE_NAME_DEVELOPMENT}" ]; then echo "::error::For flavor development, secret IOS_PROVISIONING_PROFILE_NAME_DEVELOPMENT is required."; rc=1; fi
              if [ -z "${DEVELOPMENT_API_URL}" ]; then echo "::error::For flavor development, secret DEVELOPMENT_API_URL is required (build config; see config/run/config.example.json)."; rc=1; fi
              if [ -z "${DEVELOPMENT_ENVIRONMENT}" ]; then echo "::error::For flavor development, secret DEVELOPMENT_ENVIRONMENT is required (build config; see config/run/config.example.json)."; rc=1; fi
              ;;
            *)
              echo "::error::Invalid flavor '${FLAVOR}'. Use development or production."
              exit 1
              ;;
          esac

          if [ "${rc}" -ne 0 ]; then
            echo "::error::Add the listed secrets under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: |
          set -euo pipefail
          flutter pub get

      - name: CocoaPods (Bundler, same Ruby as Fastlane)
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          set -euo pipefail
          cd ios
          bundle install
          bundle exec pod install
          pod_dir="$(dirname "$(bundle exec which pod)")"
          echo "Pod on PATH: ${pod_dir}/pod"
          echo "$pod_dir" >> "${GITHUB_PATH}"

      - name: Write App Store Connect API key and signing assets
        env:
          FLAVOR: ${{ inputs.flavor }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          IOS_BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          IOS_BUILD_PROVISION_PROFILE_BASE64_DEVELOPMENT: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64_DEVELOPMENT }}
          IOS_BUILD_PROVISION_PROFILE_BASE64_PRODUCTION: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64_PRODUCTION }}
        run: |
          set -euo pipefail
          KEY_OUT="${RUNNER_TEMP}/AuthKey.p8"
          printf '%b' "${APP_STORE_CONNECT_API_KEY}" | tr -d '\r' > "${RUNNER_TEMP}/candidate_asc.pem"
          if openssl pkey -in "${RUNNER_TEMP}/candidate_asc.pem" -noout 2>/dev/null \
            || openssl ec -in "${RUNNER_TEMP}/candidate_asc.pem" -noout 2>/dev/null; then
            cp "${RUNNER_TEMP}/candidate_asc.pem" "${KEY_OUT}"
          else
            printf '%b' "${APP_STORE_CONNECT_API_KEY}" | tr -d '\r' | tr -d '\n' | base64 -d > "${KEY_OUT}" 2>/dev/null || true
            if ! openssl pkey -in "${KEY_OUT}" -noout 2>/dev/null \
              && ! openssl ec -in "${KEY_OUT}" -noout 2>/dev/null; then
              echo "::error::APP_STORE_CONNECT_API_KEY must be the full .p8 PEM from App Store Connect (Users and Access → Keys) or Base64 of that file."
              exit 1
            fi
          fi
          echo "APP_STORE_CONNECT_API_KEY_PATH=${KEY_OUT}" >> "${GITHUB_ENV}"
          echo "${IOS_BUILD_CERTIFICATE_BASE64}" | base64 -d > "${RUNNER_TEMP}/ios_distribution.p12"
          echo "IOS_BUILD_CERTIFICATE_PATH=${RUNNER_TEMP}/ios_distribution.p12" >> "${GITHUB_ENV}"

          case "${FLAVOR}" in
            production)
              echo "${IOS_BUILD_PROVISION_PROFILE_BASE64_PRODUCTION}" | base64 -d > "${RUNNER_TEMP}/selected.mobileprovision"
              echo "IOS_BUILD_PROVISION_PROFILE_PATH_PRODUCTION=${RUNNER_TEMP}/selected.mobileprovision" >> "${GITHUB_ENV}"
              ;;
            development)
              echo "${IOS_BUILD_PROVISION_PROFILE_BASE64_DEVELOPMENT}" | base64 -d > "${RUNNER_TEMP}/selected.mobileprovision"
              echo "IOS_BUILD_PROVISION_PROFILE_PATH_DEVELOPMENT=${RUNNER_TEMP}/selected.mobileprovision" >> "${GITHUB_ENV}"
              ;;
          esac
          echo "IOS_KEYCHAIN_PASSWORD=$(openssl rand -hex 32)" >> "${GITHUB_ENV}"

      - name: Run Fastlane TestFlight upload
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          IOS_BUILD_CERTIFICATE_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_NAME_DEVELOPMENT: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME_DEVELOPMENT }}
          IOS_PROVISIONING_PROFILE_NAME_PRODUCTION: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME_PRODUCTION }}
          DEVELOPMENT_API_URL: ${{ secrets.DEVELOPMENT_API_URL }}
          DEVELOPMENT_ENVIRONMENT: ${{ secrets.DEVELOPMENT_ENVIRONMENT }}
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_ENVIRONMENT: ${{ secrets.PRODUCTION_ENVIRONMENT }}
        run: |
          set -euo pipefail
          cd ios
          bundle exec fastlane "beta_${{ inputs.flavor }}"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ inputs.flavor }}-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn
