name: android-build-production

on:
  workflow_dispatch:

  workflow_call:
    inputs:
      app_version:
        description: When set, replaces the pubspec version line before building. Callers supply the value; this workflow does not interpret tags.
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Apply pubspec version
        if: github.event_name == 'workflow_call' && inputs.app_version != ''
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          sed -i -E "s/^version:.+/version: ${APP_VERSION}/" pubspec.yaml

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: flutter pub get

      - name: Build APK
        env:
          CFG_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          CFG_ENVIRONMENT: ${{ secrets.PRODUCTION_ENVIRONMENT }}
        run: |
          flutter build apk --release --flavor prod \
            --dart-define=API_URL="$CFG_API_URL" \
            --dart-define=ENVIRONMENT="$CFG_ENVIRONMENT"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-production-release-${{ inputs.app_version }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          if-no-files-found: error
