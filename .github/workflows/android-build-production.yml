name: android-build-production

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: flutter pub get

      - name: Build APK
        env:
          CFG_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          CFG_ENVIRONMENT: ${{ secrets.PRODUCTION_ENVIRONMENT }}
        run: |
          flutter build apk --release --flavor prod \
            --dart-define=API_URL="$CFG_API_URL" \
            --dart-define=ENVIRONMENT="$CFG_ENVIRONMENT"

      - uses: actions/upload-artifact@v4
        with:
          name: app-prod-release-apk
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          if-no-files-found: error
