name: android-play-internal

on:
  workflow_dispatch:
    inputs:
      apk_artifact:
        description: APK artifact to deploy — numeric GitHub Actions artifact id for the production APK (from the build run’s artifacts API).
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_ID: ${{ inputs.apk_artifact }}
        run: |
          set -euo pipefail
          if ! [[ "${ARTIFACT_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::apk_artifact must be a numeric artifact id."
            exit 1
          fi
          curl -fSsL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o artifact.zip
          mkdir -p artifact
          unzip -q artifact.zip -d artifact

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          FOUND=$(find artifact -name 'app-production-release.apk' -print -quit || true)
          if [ -z "${FOUND}" ]; then
            FOUND=$(find artifact -name '*.apk' -print -quit || true)
          fi
          if [ -z "${FOUND}" ]; then
            echo "::error::No APK under artifact/. Contents:"
            find artifact -type f || true
            exit 1
          fi
          echo "path=${FOUND}" >> "${GITHUB_OUTPUT}"

      - name: Upload to Play internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.bakberdi.mobile_app
          releaseFiles: ${{ steps.apk.outputs.path }}
          tracks: internal
          status: completed
